name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  basic-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          # Disabling shallow clones is recommended for improving the relevancy of sonar reporting
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"


      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: install backend dependencies
        run: |
          cd backend
          uv sync --frozen --extra dev
          cp .env.example .env
          cd timescaledb-env
          docker compose up -d timescaledb

      - name: install frontend dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps --frozen-lockfile
          npm add vitest --save-dev

      - name: run backend tests
        run: |
          cd backend
          uv run pytest --junitxml=../test-report.xml

      - name: upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.xml

      - name: run backend lint
        run: |
          cd backend && uv run ruff check . --ignore DJ001

      - name: run frontend lint
        run: |
          cd frontend && npm run lint

      - name: Security scan using Trivy
        uses: aquasecurity/trivy-action@v0.14.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          output: 'security-report.txt'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'  # ne pas faire échouer ici ; on gère ça dans l'étape suivante

      - name: upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.txt

      - name: Trivy scan (CycloneDX / VEX)
        uses: aquasecurity/trivy-action@v0.14.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'cyclonedx'
          output: 'trivy-vex.json'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          vex: '.vex/vex.json'

      - name: Upload VEX report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vex
          path: trivy-vex.json

      - name: Check Trivy report
        if: always()
        run: |
          if [ -s security-report.txt ]; then
            echo "::error::Des vulnérabilités HIGH/CRITICAL ont été détectées !"
            exit 1
          else
            echo "Aucune vulnérabilité HIGH/CRITICAL détectée."
          fi

  docker-build-push:
    runs-on: ubuntu-latest
    needs: basic-pipeline

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ghcr.io/${{ github.repository }}/backend
          - service: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository }}/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
